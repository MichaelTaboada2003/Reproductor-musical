<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor Musical Estilo Spotify</title>
  <link rel="stylesheet" href="/reproductor.css">
</head>
<body>
  <div class="player-container">
    <!-- Información de la canción actual -->
    <div class="song-info">
      <div id="currentSongTitle">Sin canción</div>
      <div class="artist-name">Artista</div>
    </div>

    <!-- Elemento de audio -->
    <audio id="audioPlayer" preload="metadata">
      Tu navegador no soporta la etiqueta de audio.
    </audio>


    <div class="buttons-container">
      <!-- Botones de control -->
      <div class="controls">
        <button class="control-button" id="prevBtn">⏮</button>
        <button class="control-button play-pause" id="playBtn">▶</button>
        <button class="control-button" id="nextBtn">⏭</button>
      </div>
    
      <!-- Control de volumen -->
      <div class="volume-container">
        <span>🔊</span>
        <input 
          type="range" 
          class="volume-slider" 
          min="0" max="1" step="0.1" value="1"
        />
      </div>
    </div>
    

    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <div class="progress-bar">
          <div class="progress"></div>
      </div>
      <span id="duration">0:00</span>
    </div>


  
    <!-- Playlist dinámica (las últimas 3 canciones) -->
    <div class="playlist" id="playlistContainer"></div>
  </div>

  <script>
    let canciones = [];           // Lista completa devuelta por la API
    let indiceActual = 0;         // Índice de la canción en reproducción
    let isDragging = false;
    let newTime = 0;        

    const audioPlayer = document.getElementById('audioPlayer');
    const progressBar = document.querySelector('.progress');
    const progressBarContainer = document.querySelector('.progress-bar');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playBtn = document.getElementById('playBtn');
    const currentSongTitle = document.getElementById('currentSongTitle');
    const volumeSlider = document.querySelector('.volume-slider');

    // 1. Llamar a la API de FastAPI para obtener la lista de canciones.
    async function obtenerCanciones() {
      try {
        const respuesta = await fetch('http://127.0.0.1:8000/lista_canciones');
        const data = await respuesta.json();
        // data.canciones debe ser un array de strings (por ejemplo: ["song1.webm", "song2.webm", ...])
        canciones = data.canciones || [];

        // Cargar la primera canción si hay al menos una
        if (canciones.length > 0) {
          cargarCancion(indiceActual);
        }

        // Renderizar solo las últimas 3 en la playlist
        renderPlaylist();
      } catch (error) {
        console.error('Error obteniendo canciones:', error);
      }
    }

    // 2. Función para cargar (y reproducir) una canción por índice
    function cargarCancion(index) {
      const nombreCancion = canciones[index];
      if (!nombreCancion) {
        audioPlayer.src = '';
        currentSongTitle.textContent = 'Sin canción';
        return;
      }

      // Quitamos la extensión .webm para mostrar un título más limpio
      const tituloCancion = nombreCancion.replace(/\.webm$/i, '');
      currentSongTitle.textContent = tituloCancion;

      // URL real (con extensión) para reproducir
      const urlCancion = `http://127.0.0.1:8000/canciones/${encodeURIComponent(nombreCancion)}`;
      audioPlayer.src = urlCancion;
    }

    // 3. Renderizar las últimas 3 canciones en la playlist
    function renderPlaylist() {
      // Tomar solo las 3 últimas
      const ultimasTres = canciones.slice(-3);

      const playlistDiv = document.getElementById('playlistContainer');
      playlistDiv.innerHTML = ''; // Limpia el contenido anterior

      // Genera dinámicamente cada ítem de la playlist
      ultimasTres.forEach((nombreCancion, i) => {
        // En 'ultimasTres', el índice 0 corresponde a la primera de las "últimas 3"
        // Calculamos su índice real en la lista completa:
        const indiceReal = canciones.indexOf(nombreCancion);

        // Crear el contenedor principal
        const songItem = document.createElement('div');
        songItem.classList.add('song-item');
        if (i === 0) songItem.classList.add('active'); // Ejemplo: marcar la más reciente

        // Contenedor de detalles
        const songDetails = document.createElement('div');
        songDetails.classList.add('song-details');

        // Título y artista (aquí, si tu API no provee artista, puedes poner algo por defecto)
        const songTitle = document.createElement('span');
        songTitle.classList.add('song-title');
        songTitle.textContent = nombreCancion.replace(/\.webm$/i, '');

        const songArtist = document.createElement('span');
        songArtist.classList.add('song-artist');
        songArtist.textContent = 'Artista Desconocido'; // o ajusta según tu API

        // Duración (si no la tienes en la API, puedes dejar un valor fijo)
        const songDuration = document.createElement('span');
        songDuration.classList.add('song-duration');
        songDuration.textContent = '3:00'; // Ajusta a tu necesidad

        // Insertar nodos
        songDetails.appendChild(songTitle);
        songDetails.appendChild(songArtist);
        songItem.appendChild(songDetails);
        songItem.appendChild(songDuration);
        playlistDiv.appendChild(songItem);

        // Evento al dar clic en este ítem => reproducir la canción correspondiente
        songItem.addEventListener('click', () => {
          indiceActual = indiceReal;
          cargarCancion(indiceActual);
          audioPlayer.play();
          playBtn.textContent = '⏸';

          // Quitar 'active' de todos y poner 'active' a este
          Array.from(playlistDiv.getElementsByClassName('song-item')).forEach(el => {
            el.classList.remove('active');
          });
          songItem.classList.add('active');
        });
      });
    }

    // 4. Botón Anterior (cíclico)
    prevBtn.addEventListener('click', () => {
      if (canciones.length === 0) return;
      if (indiceActual > 0) {
        indiceActual--;
      } else {
        indiceActual = canciones.length - 1;
      }
      cargarCancion(indiceActual);
      audioPlayer.play();
      playBtn.textContent = '⏸';
    });

    // 5. Botón Siguiente (cíclico)
    nextBtn.addEventListener('click', () => {
      if (canciones.length === 0) return;
      if (indiceActual < canciones.length - 1) {
        indiceActual++;
      } else {
        indiceActual = 0;
      }
      cargarCancion(indiceActual);
      audioPlayer.play();
      playBtn.textContent = '⏸';
    });

    // 6. Botón Play / Pause
    playBtn.addEventListener('click', () => {
      if (audioPlayer.paused) {
        audioPlayer.play();
        playBtn.textContent = '⏸';
      } else {
        audioPlayer.pause();
        playBtn.textContent = '▶';
      }
    });

    // 7. Control de volumen
    volumeSlider.addEventListener('input', (e) => {
      audioPlayer.volume = e.target.value;
    });

    // 8. Actualizar tiempos de reproducción
    audioPlayer.addEventListener('timeupdate', () => {
            const currentTimeElem = document.getElementById('currentTime');
            const durationElem = document.getElementById('duration');
            const progress = document.querySelector('.progress');

            const formatTime = (time) => {
                if (isNaN(time) || !isFinite(time)) return '0:00';
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            // Actualizar tiempos
            currentTimeElem.textContent = formatTime(audioPlayer.currentTime);
            durationElem.textContent = formatTime(audioPlayer.duration);

            // Actualizar barra de progreso
            const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = `${progressPercent}%`;
        });

        // Manejador para iniciar el arrastre
progressBarContainer.addEventListener('mousedown', (event) => {
  isDragging = true;
  updateVisualProgress(event); // Actualiza visualmente la barra durante el arrastre
});

// Manejador para actualizar el progreso visual mientras se arrastra
document.addEventListener('mousemove', (event) => {
  if (isDragging) {
    updateVisualProgress(event);
  }
});

// Manejador para finalizar el arrastre y aplicar el cambio de tiempo al audio
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    audioPlayer.currentTime = newTime; // Aplicar el tiempo calculado al soltar el ratón
  }
});

// Función para calcular y actualizar el progreso visualmente
function updateVisualProgress(event) {
  const rect = progressBarContainer.getBoundingClientRect(); // Dimensiones de la barra
  const offsetX = event.clientX - rect.left; // Posición horizontal del cursor dentro de la barra
  const width = rect.width; // Ancho total de la barra
  const progressPercent = Math.min(Math.max(offsetX / width, 0), 1); // Normalizar entre 0 y 1
  progressBar.style.width = `${progressPercent * 100}%`; // Actualiza la barra visualmente
  newTime = progressPercent * audioPlayer.duration; // Calcula el nuevo tiempo, pero no lo aplica todavía
}

    // 9. Iniciar la aplicación
    obtenerCanciones();
  </script>
</body>
</html>
